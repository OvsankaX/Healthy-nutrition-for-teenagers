<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPGRADOR V23 ULTRA GLOW</title>
    <style>
        :root {
            --bg: #0a0a0a; --panel: #161616; --accent: #a020f0;
            --accent-glow: rgba(160, 32, 240, 0.8);
            --win: #00ff88; --loss: #ff3e3e; --radius: 12px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Toasts */
        #toast-container { position: fixed; top: 10px; right: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
        .toast {
            background: rgba(20, 20, 20, 0.98); border-left: 4px solid var(--accent);
            padding: 14px 18px; border-radius: 8px; color: #fff; font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 15px var(--accent-glow);
            display: flex; justify-content: space-between; align-items: center;
            animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        header { 
            height: 60px; background: #000; display: flex; align-items: center; 
            padding: 0 15px; border-bottom: 1px solid #222; flex-shrink: 0; position: relative;
        }
        .header-logo { 
            position: absolute; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-glow);
        }
        .nav-btn { font-size: 1.5rem; cursor: pointer; z-index: 10; padding: 5px; }
        .balance-box { margin-left: auto; display: flex; align-items: center; gap: 6px; font-weight: 900; }

        main { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { display: none; width: 100%; max-width: 400px; }

        /* Wheel Area */
        .wheel-outer { width: 100%; display: flex; justify-content: center; margin: 20px 0; position: relative; }
        .wheel-container { 
            position: relative; width: 250px; height: 250px; 
            border-radius: 50%; border: 8px solid #1a1a1a; background: #000; overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }
        
        #wheel-fill { 
            position: absolute; bottom: 0; width: 100%; 
            background: linear-gradient(0deg, #4b0082 0%, #a020f0 50%, #d88fff 100%);
            box-shadow: 0 0 50px var(--accent);
            transition: height 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
        }

        #cursor-wrapper { position: absolute; inset: 0; z-index: 20; will-change: transform; }
        #cursor-line { 
            position: absolute; top: 0; left: 50%; 
            width: 3px; height: 18px; 
            background: #fff; transform: translateX(-50%); 
            box-shadow: 0 0 15px #fff, 0 0 30px var(--accent); border-radius: 0 0 4px 4px; 
        }

        .center-stat { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; pointer-events: none; }
        #status-msg { height: 45px; font-size: 2rem; font-weight: 900; margin-top: 10px; text-transform: uppercase; }

        /* Взрыв ровно по центру */
        #particle-canvas { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            pointer-events: none; z-index: 100; 
            width: 500px; height: 500px; 
        }

        /* Profile Stats */
        .stat-card { background: var(--panel); border: 1px solid #222; border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .total-val { font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; }
        .sub-stats-row { display: flex; justify-content: center; gap: 15px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; opacity: 0.9; }

        /* Buttons & Inputs */
        .search-row { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; }
        .input-dark { flex: 1; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        
        .btn-row { display: flex; width: 100%; gap: 6px; margin-bottom: 8px; }
        .opt-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 14px 2px; border-radius: 10px; flex: 1; font-weight: 800; }
        .opt-btn.active { background: var(--accent); border-color: #fff; box-shadow: 0 0 15px var(--accent-glow); }
        .action-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 1.2rem; font-weight: 900; margin: 10px 0; box-shadow: 0 5px 15px var(--accent-glow); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; padding-bottom: 20px; }
        .item-frame { border: 1px solid #222; border-radius: var(--radius); padding: 15px; background: var(--panel); text-align: center; cursor: pointer; }
        .item-frame.selected { border-color: var(--accent); background: #1e0a2e; box-shadow: 0 0 15px var(--accent-glow); }
        .price { font-weight: 900; color: var(--win); margin-top: 5px; font-size: 1.1rem; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 8000; }
        .modal-card { background: var(--panel); border: 2px solid var(--accent); border-radius: 20px; padding: 30px; width: 90%; max-width: 340px; text-align: center; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .win-glow { color: var(--win) !important; text-shadow: 0 0 25px var(--win); }
        .loss-glow { color: var(--loss) !important; text-shadow: 0 0 25px var(--loss); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="modal-overlay">
        <div class="modal-card">
            <p id="modal-text" style="margin-bottom: 25px; font-size: 1.2rem; font-weight: 700;"></p>
            <div style="display: flex; gap: 12px;">
                <button class="opt-btn" style="background: #333;" onclick="closeModal(false)">НЕТ</button>
                <button class="opt-btn" style="background: var(--accent);" onclick="closeModal(true)">ДА</button>
            </div>
        </div>
    </div>

    <div id="auth-screen">
        <div style="background:var(--panel); padding:30px; border-radius:20px; border:2px solid var(--accent); width:300px; text-align:center;">
            <h1 style="color:var(--accent); margin-bottom:20px;">UPGRADOR</h1>
            <input type="text" id="user-in" placeholder="Никнейм..." class="input-dark" style="margin-bottom:20px; text-align:center;">
            <button class="action-btn" style="margin:0" onclick="login()">ВОЙТИ</button>
        </div>
    </div>

    <header>
        <div class="nav-btn" onclick="showPage('shop')">🛒</div>
        <div class="header-logo" onclick="showPage('main')">UPGRADOR</div>
        <div class="balance-box"><span id="bal">0</span> ₴ <div class="nav-btn" onclick="showPage('profile')">👤</div></div>
    </header>

    <main>
        <div id="p-main" class="container" style="display: block;">
            <div class="wheel-outer">
                <canvas id="particle-canvas"></canvas>
                <div class="wheel-container">
                    <div id="wheel-fill" style="height: 10%;"></div>
                    <div id="cursor-wrapper"><div id="cursor-line"></div></div>
                    <div class="center-stat">
                        <h2 id="pct-view" style="font-size: 2.8rem; font-weight: 900;">10%</h2>
                        <div id="status-msg"></div>
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button class="opt-btn bc x-ctrl" id="m2" onclick="setM(2, 'm2')">X2</button>
                <button class="opt-btn bc x-ctrl" id="m4" onclick="setM(4, 'm4')">X4</button>
                <button class="opt-btn bc x-ctrl" id="m10" onclick="setM(10, 'm10')">X10</button>
            </div>
            <div class="btn-row">
                <button class="opt-btn bc x-ctrl" id="c35" onclick="setChance(35, 'c35')">35%</button>
                <button class="opt-btn bc x-ctrl" id="c55" onclick="setChance(55, 'c55')">55%</button>
                <button class="opt-btn bc x-ctrl" id="c75" onclick="setChance(75, 'c75')">75%</button>
            </div>
            <button class="action-btn" id="go-btn" onclick="startSpin()" disabled>ПРОКАЧАТЬ</button>
            <div id="inv-main" class="grid"></div>
        </div>

        <div id="p-shop" class="container">
            <h3 style="margin-bottom:15px; text-align:center;">МАГАЗИН</h3>
            <div class="search-row">
                <input type="number" id="budget" placeholder="Бюджет..." class="input-dark">
                <button class="opt-btn" style="flex:0.4" onclick="refreshShop()">ПОИСК</button>
            </div>
            <div id="shop-grid" class="grid"></div>
            <button class="action-btn" onclick="askBuy()">КУПИТЬ ВЫБРАННОЕ</button>
        </div>

        <div id="p-profile" class="container">
            <h3 style="margin-bottom:15px; text-align:center;">ПРОФИЛЬ</h3>
            <div class="stat-card">
                <div style="font-size: 0.9rem; opacity: 0.6;">ОБЩИЙ ПРОФИТ:</div>
                <div id="prof-total" class="total-val">0 ₴</div>
                <div class="sub-stats-row">
                    <span id="prof-plus" style="color:var(--win)">+0</span>
                    <span id="prof-minus" style="color:var(--loss)">-0</span>
                </div>
            </div>
            <div class="btn-row">
                <button class="opt-btn" onclick="askSellSelected()">ПРОДАТЬ ВЫБОР</button>
                <button class="opt-btn" onclick="askSellAll()" style="color:var(--loss)">ПРОДАТЬ ВСЁ</button>
            </div>
            <div id="inv-prof" class="grid" style="margin-top:15px"></div>
        </div>
    </main>

    <script>
        let user = { name: "", bal: 1000, inv: [], stats: { ups: 0, lost: 0, earned: 0, best: {n: "-", p: 0} } };
        let chance = 10, selected = new Set(), spinning = false, currentRot = 0, pendingAction = null;

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = 500; canvas.height = 500;

        function spawnExplosion() {
            for(let i=0; i<100; i++) { // Увеличено до 100
                particles.push({
                    x: 250, y: 250, // Ровно центр канваса
                    vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, // Скорость выше
                    size: Math.random()*5 + 2,
                    life: 1, 
                    color: Math.random() > 0.4 ? '#a020f0' : (Math.random() > 0.5 ? '#00ff88' : '#ffffff')
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0,0,500,500);
            particles.forEach((p,i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.015;
                if(p.life <= 0) particles.splice(i,1);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 15; ctx.shadowColor = p.color; // Эффект свечения частиц
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        function toast(text) {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerHTML = `<span>${text}</span>`;
            container.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function login() {
            const n = document.getElementById('user-in').value.trim();
            if(!n) return;
            const saved = localStorage.getItem('upg_v23_'+n);
            if(saved) user = JSON.parse(saved);
            else { user.name = n; user.inv = [{id:1, n:"Стартовый предмет", p:100}]; }
            document.getElementById('auth-screen').style.display = 'none';
            refreshShop(); update();
        }

        function update() {
            document.getElementById('bal').innerText = Math.floor(user.bal);
            renderInv('inv-main', true);
            renderInv('inv-prof', false);
            const total = user.stats.earned - user.stats.lost;
            const tEl = document.getElementById('prof-total');
            tEl.innerText = `${total >= 0 ? '+' : ''}${total} ₴`;
            tEl.style.color = total >= 0 ? 'var(--win)' : 'var(--loss)';
            document.getElementById('prof-plus').innerText = `ВЫИГРАНО: +${user.stats.earned}`;
            document.getElementById('prof-minus').innerText = `СЛИТО: -${user.stats.lost}`;
            document.getElementById('go-btn').disabled = (selected.size === 0 || spinning);
            localStorage.setItem('upg_v23_'+user.name, JSON.stringify(user));
        }

        function renderInv(id, single) {
            const g = document.getElementById(id); if(!g) return;
            g.innerHTML = '';
            user.inv.forEach(i => {
                const d = document.createElement('div');
                d.className = `item-frame ${selected.has(i.id) ? 'selected' : ''}`;
                d.innerHTML = `<b>${i.n}</b><div class="price">${i.p} ₴</div>`;
                d.onclick = () => {
                    if(spinning) return;
                    if(single) { let was = selected.has(i.id); selected.clear(); if(!was) selected.add(i.id); }
                    else { if(selected.has(i.id)) selected.delete(i.id); else selected.add(i.id); }
                    update();
                };
                g.appendChild(d);
            });
        }

        function setChance(c, id) { 
            if(spinning) return;
            chance = c; 
            document.getElementById('wheel-fill').style.height = c + '%'; 
            document.getElementById('pct-view').innerText = c + '%'; 
            document.querySelectorAll('.bc').forEach(b => b.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }
        function setM(m, id) { setChance(Math.floor(100/m), id); }

        function startSpin() {
            if(spinning || selected.size !== 1) return;
            spinning = true;
            document.getElementById('status-msg').innerText = "";
            document.querySelectorAll('.x-ctrl').forEach(b => b.disabled = true);
            const item = user.inv.find(x => x.id === [...selected][0]);
            let start = null, dur = 3500, rot = 1800 + (Math.random()*360), sAng = currentRot;

            function animate(now) {
                if(!start) start = now;
                let t = Math.min((now - start) / dur, 1);
                let ease = 1 - Math.pow(1 - t, 4); // Quartic ease out
                currentRot = sAng + (ease * rot);
                document.getElementById('cursor-wrapper').style.transform = `rotate(${currentRot}deg)`;
                if(t < 1) requestAnimationFrame(animate);
                else finish(currentRot % 360, item);
            }
            requestAnimationFrame(animate);
        }

        function finish(deg, item) {
            spinning = false;
            document.querySelectorAll('.x-ctrl').forEach(b => b.disabled = false);
            const winSize = (chance / 100) * 360;
            const win = (deg >= (180 - winSize/2 - 5) && deg <= (180 + winSize/2 + 5));
            const msg = document.getElementById('status-msg');
            
            if(win) {
                const profit = Math.floor(item.p * (100/chance)) - item.p;
                item.p += profit; item.n = "★ " + item.n.replace("★ ", "");
                user.stats.earned += profit;
                msg.innerText = "УСПЕХ"; msg.className = "win-glow";
                spawnExplosion(); toast(`+${profit} ₴`);
            } else {
                user.stats.lost += item.p;
                user.inv = user.inv.filter(x => x.id !== item.id);
                msg.innerText = "НЕУДАЧА"; msg.className = "loss-glow";
                toast(`-${item.p} ₴`);
            }
            selected.clear(); update();
        }

        function openModal(text, action) {
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-overlay').style.display = 'flex';
            pendingAction = action;
        }
        function closeModal(confirm) {
            document.getElementById('modal-overlay').style.display = 'none';
            if(confirm && pendingAction) pendingAction();
            pendingAction = null;
        }

        let shopItems = [];
        function refreshShop() {
            const bud = parseInt(document.getElementById('budget').value) || 50;
            const pool = ["Чип", "Ключ", "Часы", "Цепь", "Кольцо", "Диск", "Смартфон"];
            shopItems = Array.from({length:6}, (_,i) => ({
                id:'s'+i, 
                n: pool[Math.floor(Math.random()*pool.length)], 
                p: Math.floor(bud + Math.random() * bud)
            }));
            const g = document.getElementById('shop-grid'); g.innerHTML = '';
            shopItems.forEach(i => {
                const d = document.createElement('div'); d.className = 'item-frame';
                d.innerHTML = `<b>${i.n}</b><div class="price">${i.p} ₴</div>`;
                d.onclick = () => { i.sel = !i.sel; d.classList.toggle('selected'); };
                g.appendChild(d);
            });
        }

        function askBuy() {
            let sel = shopItems.filter(i => i.sel);
            if(!sel.length) return;
            let cost = sel.reduce((a, b) => a + b.p, 0);
            openModal(`Купить за ${cost} ₴?`, () => {
                if(user.bal < cost) return toast("МАЛО ДЕНЕГ!");
                sel.forEach(i => { user.bal -= i.p; user.inv.push({...i, id: Date.now()+Math.random(), sel:false}); });
                refreshShop(); update();
            });
        }

        function askSellSelected() {
            let sel = user.inv.filter(i => selected.has(i.id));
            if(!sel.length) return;
            let cost = sel.reduce((a, b) => a + b.p, 0);
            openModal(`Продать за ${cost} ₴?`, () => {
                user.inv = user.inv.filter(i => !selected.has(i.id));
                user.bal += cost; selected.clear(); update();
            });
        }

        function askSellAll() {
            if(!user.inv.length) return;
            let cost = user.inv.reduce((a, b) => a + b.p, 0);
            openModal(`ПРОДАТЬ ВСЁ ЗА ${cost} ₴?`, () => {
                user.bal += cost; user.inv = []; update();
            });
        }

        function showPage(p) {
            if(spinning) return;
            ['main','shop','profile'].forEach(x => document.getElementById('p-'+x).style.display='none');
            document.getElementById('p-'+p).style.display='block';
            selected.clear(); update();
        }
    </script>
</body>
</html>
